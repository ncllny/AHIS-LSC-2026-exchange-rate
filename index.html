<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marble Market Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f4f4f4;
}

.station {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

button {
    margin: 2px;
    padding: 5px 10px;
}

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}
</style>
</head>

<body>

<h1>🎯 Marble Market Dashboard</h1>

<div id="stations"></div>

<h2>Total Counts</h2>
<table>
<tr>
<th>Red</th>
<th>Green</th>
<th>Blue</th>
<th>Yellow</th>
<th>Orange</th>
</tr>
<tr>
<td id="r">0</td>
<td id="g">0</td>
<td id="b">0</td>
<td id="y">0</td>
<td id="o">0</td>
</tr>
</table>

<h2>Market Values</h2>
<div id="values"></div>

<script>

const colours = ["red","green","blue","yellow","orange"];
const stationCount = 5;

let data = Array.from({length: stationCount}, () => ({
    red:0, green:0, blue:0, yellow:0, orange:0
}));

function render(){
    const container = document.getElementById("stations");
    container.innerHTML = "";

    data.forEach((s, i) => {
        let div = document.createElement("div");
        div.className = "station";

        div.innerHTML = `<h3>Station ${i+1}</h3>`;

        colours.forEach(c => {
            div.innerHTML += `
                <b>${c.toUpperCase()}</b>: ${s[c]}
                <button onclick="add(${i},'${c}',1)">+</button>
                <button onclick="add(${i},'${c}',-1)">-</button>
                <br>
            `;
        });

        container.appendChild(div);
    });
}

function add(i, c, v){
    data[i][c] += v;
    if(data[i][c] < 0) data[i][c] = 0;
    update();
}

function totals(){
    let t = {red:0,green:0,blue:0,yellow:0,orange:0};

    data.forEach(s=>{
        for(let c in t){
            t[c] += s[c];
        }
    });

    return t;
}

function marketValues(t){
    let arr = Object.entries(t);
    arr.sort((a,b)=>a[1]-b[1]);

    let v = {};
    v[arr[0][0]] = 1;
    v[arr[1][0]] = 2;
    v[arr[2][0]] = 3;
    v[arr[3][0]] = 2;
    v[arr[4][0]] = 1;

    return v;
}

function update(){
    let t = totals();

    document.getElementById("r").innerText = t.red;
    document.getElementById("g").innerText = t.green;
    document.getElementById("b").innerText = t.blue;
    document.getElementById("y").innerText = t.yellow;
    document.getElementById("o").innerText = t.orange;

    let v = marketValues(t);

    document.getElementById("values").innerHTML =
        `Red: ${v.red} | Green: ${v.green} | Blue: ${v.blue} | Yellow: ${v.yellow} | Orange: ${v.orange}`;

    render(); // IMPORTANT FIX: refresh station display
}

render();
update();

</script>

</body>
</html>
