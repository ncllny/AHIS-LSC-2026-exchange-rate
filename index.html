<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marble Game Controller</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f4f4f4;
}

.panel {
    background: white;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
}

input, select, button {
    padding: 6px;
    margin: 4px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
    font-size: 13px;
}

.log {
    max-height: 220px;
    overflow-y: auto;
}

.teamBox {
    padding: 6px;
    margin: 5px 0;
    border: 1px solid #ddd;
    background: #fafafa;
}
</style>
</head>

<body>

<h1>🎮 Marble Game Controller</h1>

<!-- INITIAL SETUP -->
<div class="panel">
<h3>🎯 Initial Setup</h3>

<input id="initRed" type="number" placeholder="Red" value="0">
<input id="initGreen" type="number" placeholder="Green" value="0">
<input id="initBlue" type="number" placeholder="Blue" value="0">
<input id="initYellow" type="number" placeholder="Yellow" value="0">
<input id="initOrange" type="number" placeholder="Orange" value="0">

<button onclick="setInitial()">Set Initial Stock</button>
</div>

<!-- TRANSACTION -->
<div class="panel">
<h3>➕ Transaction</h3>

<select id="team"></select>

<select id="colour">
    <option>Red</option>
    <option>Green</option>
    <option>Blue</option>
    <option>Yellow</option>
    <option>Orange</option>
</select>

<select id="type">
    <option value="1">+ Give</option>
    <option value="-1">- Remove</option>
</select>

<input id="amount" type="number" value="1" min="1">

<button onclick="addTx()">Submit</button>
<button onclick="undo()">↩ Undo</button>
</div>


<!-- GLOBAL STOCK -->
<div class="panel">
<h3>📊 Global Stock</h3>

<table>
<tr>
<th>Red</th>
<th>Green</th>
<th>Blue</th>
<th>Yellow</th>
<th>Orange</th>
</tr>
<tr>
<td id="r">0</td>
<td id="g">0</td>
<td id="b">0</td>
<td id="y">0</td>
<td id="o">0</td>
</tr>
</table>
</div>

<div class="panel">
<h3>💰 Live Point System (Based on Global Stock)</h3>
<div id="pointsDisplay"></div>
</div>

<!-- LOG -->
<div class="panel log">
<h3>📜 Event Log</h3>
<table>
<thead>
<tr>
<th>Time</th>
<th>Team</th>
<th>Colour</th>
<th>Change</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>
</div>

<div class="panel">
  <h3>⚠️ Reset Game Data</h3>
  <p>This will erase all station marble counts, global stock, and event-log history.</p>
  <button onclick="resetAll()" style="background:#c62828; color:white;">
    Reset All Data
  </button>
</div>


<script>

// ================= DATA =================
let tx = [];

let totals = {
    red:0,
    green:0,
    blue:0,
    yellow:0,
    orange:0
};

let teams = [];

// create 10 teams
for(let i=1;i<=10;i++){
    teams.push({
        name:"Station " + i,
        red:0,
        green:0,
        blue:0,
        yellow:0,
        orange:0
    });
}

// ================= INIT DROPDOWN =================
function initTeams(){
    let sel = document.getElementById("team");
    sel.innerHTML = "";
    teams.forEach((t,i)=>{
        sel.innerHTML += `<option value="${i}">${t.name}</option>`;
    });
}

// ================= SAVE / LOAD =================
function save(){
    localStorage.setItem("marble_final", JSON.stringify({
        teams,
        totals,
        tx
    }));
}

function load(){
    let data = localStorage.getItem("marble_final");
    if(data){
        let obj = JSON.parse(data);
        teams = obj.teams;
        totals = obj.totals;
        tx = obj.tx;
    }
}

// ================= INITIAL =================
function setInitial(){
    totals.red = +document.getElementById("initRed").value;
    totals.green = +document.getElementById("initGreen").value;
    totals.blue = +document.getElementById("initBlue").value;
    totals.yellow = +document.getElementById("initYellow").value;
    totals.orange = +document.getElementById("initOrange").value;

    update();
    save();
}

// ================= TRANSACTION =================
function addTx(){

    let i = document.getElementById("team").value;
    let c = document.getElementById("colour").value.toLowerCase();
    let t = +document.getElementById("type").value;
    let a = +document.getElementById("amount").value;

    let change = t * a;

    teams[i][c] += change;
    totals[c] += change;

    if(teams[i][c] < 0) teams[i][c] = 0;
    if(totals[c] < 0) totals[c] = 0;

    tx.push({
        time:new Date().toLocaleTimeString(),
        team:teams[i].name,
        colour:c,
        change
    });

    update();
    save();
}

// ================= UNDO =================
function undo(){
    if(tx.length === 0) return;

    let last = tx.pop();

    let i = teams.findIndex(t => t.name === last.team);
    let c = last.colour;
    let change = last.change;

    // reverse team change
    teams[i][c] -= change;
    if(teams[i][c] < 0) teams[i][c] = 0;

    // reverse global stock change (IMPORTANT FIX)
    totals[c] -= change;
    if(totals[c] < 0) totals[c] = 0;

    update();
    save();
}
// ================= UI UPDATE =================
function update(){

    document.getElementById("r").innerText = totals.red;
    document.getElementById("g").innerText = totals.green;
    document.getElementById("b").innerText = totals.blue;
    document.getElementById("y").innerText = totals.yellow;
    document.getElementById("o").innerText = totals.orange;

    renderLog();
    renderPoints();
}

// ================= TEAMS =================


// ================= LOG =================
function renderLog(){
    let html = "";

    tx.slice().reverse().forEach(t=>{
        html += `<tr>
        <td>${t.time}</td>
        <td>${t.team}</td>
        <td>${t.colour}</td>
        <td>${t.change}</td>
        </tr>`;
    });

    document.getElementById("log").innerHTML = html;
}


function renderPoints(){

    let display = document.getElementById("pointsDisplay");

    let entries = Object.entries(totals);

    // if empty, show message
    if(entries.length === 0){
        display.innerHTML = "No data yet";
        return;
    }

    // sort low stock → high value
    entries.sort((a,b)=>a[1]-b[1]);

    let points = {};

    // assign 1–2–3–2–1 (safe check)
    let values = [1,2,3,2,1];

    for(let i=0;i<entries.length;i++){
        points[entries[i][0]] = values[i] || 1;
    }

    let html = "";

    entries.forEach(e=>{
        html += `${e[0]}: ${points[e[0]]} pts (stock: ${e[1]})<br>`;
    });

    display.innerHTML = html;
}

    // ================= RESET ALL DATA =================
function resetAll(){
    const confirmed = confirm(
        "Are you sure you want to reset EVERYTHING?\n\n" +
        "This will delete:\n" +
        "- All global stock\n" +
        "- All station marble counts\n" +
        "- All event log records\n\n" +
        "This cannot be undone."
    );

    if(!confirmed) return;

    // Clear all transaction history
    tx = [];

    // Reset global stock
    totals = {
        red: 0,
        green: 0,
        blue: 0,
        yellow: 0,
        orange: 0
    };

    // Reset every station
    teams.forEach(team => {
        team.red = 0;
        team.green = 0;
        team.blue = 0;
        team.yellow = 0;
        team.orange = 0;
    });

    // Clear saved browser data
    localStorage.removeItem("marble_final");

    // Clear initial-stock input boxes
    document.getElementById("initRed").value = 0;
    document.getElementById("initGreen").value = 0;
    document.getElementById("initBlue").value = 0;
    document.getElementById("initYellow").value = 0;
    document.getElementById("initOrange").value = 0;

    // Save fresh blank game and refresh screen
    save();
    update();

    alert("All game data has been reset.");
}
// ================= START =================
load();
initTeams();
update();

</script>

</body>
</html>
